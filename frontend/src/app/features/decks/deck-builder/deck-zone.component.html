<div>
  <div class="flex items-center gap-2 mb-2">
    <h3 class="text-sm font-bold" style="color: var(--color-text)">{{ title() }}</h3>
    <span class="text-xs px-1.5 py-0.5 rounded font-medium" [class]="badgeClass()">
      {{ count() }} / {{ maxLabel() }}
    </span>
  </div>

  <div class="rounded-lg border-2 transition-colors p-1"
       [class.min-h-20]="large()"
       [class.min-h-12]="!large()"
       [class]="isDragOver()
         ? 'border-blue-500 bg-blue-500/5'
         : cards().length === 0 ? 'border-dashed border-[var(--color-border)]' : 'border-transparent'"
       (dragover)="zoneDragOver.emit($event)"
       (dragleave)="zoneDragLeave.emit($event)"
       (drop)="zoneDrop.emit($event)">

    @if (cards().length === 0) {
      <div class="flex items-center justify-center text-xs"
           [class.h-16]="large()" [class.h-10]="!large()"
           style="color: var(--color-text-muted)">
        {{ emptyText() }}
      </div>
    } @else {
      <div class="flex flex-wrap gap-1">
        @for (card of cards(); track $index) {
          <div class="relative group w-16 rounded overflow-hidden cursor-grab active:cursor-grabbing select-none"
               draggable="true"
               (dragstart)="cardDragStart.emit({ event: $event, card, index: $index })"
               (dragend)="cardDragEnd.emit()"
               [title]="card.name">
            @if (card.imageUrlSmall) {
              <img [src]="card.imageUrlSmall" [alt]="card.name"
                   class="w-full aspect-[59/86] object-cover pointer-events-none" loading="lazy" />
            } @else {
              <div class="w-full aspect-[59/86] bg-gray-700 flex items-center justify-center text-xs pointer-events-none">🃏</div>
            }
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity
                        flex items-center justify-center pointer-events-none">
              <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
              </svg>
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
